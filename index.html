<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airdown - YouTube Downloader</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
    }
    h1 {
      text-align: center;
      font-size: 52px;
      margin-bottom: 8px;
    }
    p.subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
    }
    input {
      width: 100%;
      padding: 18px;
      font-size: 17px;
      background: #1f1f1f;
      border: 2px solid #444;
      border-radius: 12px;
      color: white;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .result {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 16px;
      margin-top: 20px;
    }
    .download-btn {
      background: #22c55e;
      padding: 16px;
      width: 100%;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      margin: 10px 0;
    }
    .error {
      color: #ef4444;
      text-align: center;
      padding: 15px;
      background: #3f1f1f;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Airdown</h1>
    <p class="subtitle">YouTube Downloader • 4K with Audio</p>

    <input type="text" id="url" placeholder="Paste YouTube link here..." />

    <button onclick="getVideo()">Get Download Links</button>

    <div id="error" class="error" style="display:none;"></div>

    <div id="result" class="result" style="display:none;">
      <h3 id="title" style="margin-top:0;"></h3>
      <img id="thumb" style="width:100%; border-radius:12px; margin:15px 0;" />
      <div id="formats"></div>
    </div>

    <p style="text-align:center; margin-top:40px; color:#555; font-size:13px;">
      For personal use only • Respect copyright
    </p>
  </div>

  <script>
    async function getVideo() {
      const inputUrl = document.getElementById("url").value.trim();
      const errorDiv = document.getElementById("error");
      const resultDiv = document.getElementById("result");

      errorDiv.style.display = "none";
      resultDiv.style.display = "none";

      if (!inputUrl) {
        errorDiv.textContent = "Please paste a YouTube link";
        errorDiv.style.display = "block";
        return;
      }

      try {
        const res = await fetch("https://api.cobalt.tools/api/json", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: inputUrl,
            isAudioOnly: false
          })
        });

        const data = await res.json();

        if (data.status === "error") {
          throw new Error(data.text || "Failed to process video");
        }

        // Show result
        document.getElementById("title").textContent = data.text || "Video";
        document.getElementById("thumb").src = data.thumbnail || "";

        const formatsDiv = document.getElementById("formats");
        formatsDiv.innerHTML = `<p style="margin:10px 0 15px; color:#aaa;">Click to download (includes audio)</p>`;

        const btn = document.createElement("button");
        btn.className = "download-btn";
        btn.textContent = "⬇️ Download Video (Best Quality with Audio)";
        btn.onclick = () => {
          window.location.href = data.url;
        };
        formatsDiv.appendChild(btn);

        resultDiv.style.display = "block";

      } catch (err) {
        errorDiv.textContent = err.message || "Failed. Try another video.";
        errorDiv.style.display = "block";
      }
    }
  </script>
</body>
</html>
