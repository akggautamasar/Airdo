<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airdown - YouTube Downloader</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 620px;
      margin: 40px auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      font-size: 48px;
      margin-bottom: 8px;
    }
    p.subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
    }
    input {
      width: 100%;
      padding: 18px;
      font-size: 17px;
      background: #252525;
      border: 2px solid #444;
      border-radius: 12px;
      color: white;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 25px;
      background: #252525;
      padding: 20px;
      border-radius: 12px;
    }
    .download-btn {
      background: #22c55e;
      margin: 10px 0;
      padding: 16px;
    }
    .error {
      color: #ef4444;
      background: #3a1f1f;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    .loading {
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Airdown</h1>
    <p class="subtitle">YouTube Downloader with Audio • Personal Use</p>

    <input type="text" id="urlInput" placeholder="Paste YouTube link here..." />

    <button onclick="fetchDownload()" id="goBtn">Get Download Link</button>

    <div id="error" class="error" style="display: none;"></div>
    <div id="loading" class="loading" style="display: none;">Processing... Please wait</div>

    <div id="result" class="result" style="display: none;">
      <h3 id="videoTitle"></h3>
      <button id="downloadButton" class="download-btn">⬇️ Download MP4 (with Audio)</button>
    </div>

    <p style="text-align: center; margin-top: 40px; font-size: 13px; color: #555;">
      For personal use only • Respect copyright
    </p>
  </div>

  <script>
    async function fetchDownload() {
      const url = document.getElementById("urlInput").value.trim();
      const errorDiv = document.getElementById("error");
      const loadingDiv = document.getElementById("loading");
      const resultDiv = document.getElementById("result");
      const goBtn = document.getElementById("goBtn");

      errorDiv.style.display = "none";
      resultDiv.style.display = "none";
      loadingDiv.style.display = "block";
      goBtn.disabled = true;

      if (!url) {
        errorDiv.textContent = "Please paste a YouTube link";
        errorDiv.style.display = "block";
        loadingDiv.style.display = "none";
        goBtn.disabled = false;
        return;
      }

      try {
        // Using Vevioz public API
        const response = await fetch(`https://api.vevioz.com/api/button/mp4/${encodeURIComponent(url)}`);
        const data = await response.json();

        if (data.status !== "success" || !data.url) {
          throw new Error("API could not process this video. Try another one.");
        }

        document.getElementById("videoTitle").textContent = "Video Ready for Download";
        const dlBtn = document.getElementById("downloadButton");
        dlBtn.onclick = () => window.open(data.url, "_blank");

        resultDiv.style.display = "block";

      } catch (err) {
        errorDiv.textContent = err.message || "Failed to fetch download link. Try a different video.";
        errorDiv.style.display = "block";
      } finally {
        loadingDiv.style.display = "none";
        goBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
