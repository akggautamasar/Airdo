<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airdown</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #0f0f0f; 
      color: white; 
      margin: 0; 
      padding: 20px; 
    }
    .container { max-width: 600px; margin: 40px auto; }
    h1 { text-align: center; font-size: 48px; margin-bottom: 10px; }
    p { text-align: center; color: #aaa; }
    input { 
      width: 100%; 
      padding: 18px; 
      font-size: 17px; 
      background: #1f1f1f; 
      border: 2px solid #444; 
      border-radius: 12px; 
      color: white; 
      margin-bottom: 15px; 
    }
    button { 
      width: 100%; 
      padding: 18px; 
      font-size: 18px; 
      background: #ef4444; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
    }
    .result { 
      background: #1f1f1f; 
      padding: 20px; 
      border-radius: 12px; 
      margin-top: 20px; 
    }
    .download-btn { 
      background: #22c55e; 
      padding: 16px; 
      width: 100%; 
      border: none; 
      border-radius: 12px; 
      color: white; 
      font-size: 18px; 
      margin: 10px 0; 
    }
    .error { color: #ef4444; text-align: center; padding: 15px; background: #3f1f1f; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Airdown</h1>
    <p>YouTube Downloader • Personal Use</p>

    <input type="text" id="url" placeholder="Paste YouTube link here..." />

    <button onclick="getDownload()">Get Download Link</button>

    <div id="error" class="error" style="display:none;"></div>

    <div id="result" class="result" style="display:none;">
      <h3 id="title"></h3>
      <button id="dlBtn" class="download-btn">⬇️ Download Video (with Audio)</button>
    </div>

    <p style="text-align:center; margin-top:50px; color:#555; font-size:13px;">
      For personal use only • Respect copyright
    </p>
  </div>

  <script>
    async function getDownload() {
      const url = document.getElementById("url").value.trim();
      const errorDiv = document.getElementById("error");
      const resultDiv = document.getElementById("result");

      errorDiv.style.display = "none";
      resultDiv.style.display = "none";

      if (!url) {
        errorDiv.textContent = "Please paste a YouTube link";
        errorDiv.style.display = "block";
        return;
      }

      try {
        // Using a reliable public API
        const res = await fetch(`https://api.vevioz.com/api/button/mp4/${encodeURIComponent(url)}`);
        const data = await res.json();

        if (data.status !== "success" || !data.url) {
          throw new Error("Failed to get download link. Try another video.");
        }

        document.getElementById("title").textContent = "Video Ready";
        const dlBtn = document.getElementById("dlBtn");
        dlBtn.onclick = () => window.open(data.url, "_blank");
        resultDiv.style.display = "block";

      } catch (err) {
        errorDiv.textContent = err.message || "Failed to fetch. Try again with a different video.";
        errorDiv.style.display = "block";
      }
    }
  </script>
</body>
</html>
